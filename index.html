<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Roblox AI Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <h2>🤖 AI Panel</h2>
    <div>
        <a href="privacy.html">Gizlilik</a>
        <a href="terms.html">Politika</a>
    </div>
</nav>

<div class="hero">
    <h1>AI ile Roblox Kontrolü</h1>
    <p>Gerçek zamanlı komut sistemi</p>
</div>

<div class="card">
    <h3>Giriş Yap</h3>
    <input type="text" id="username" placeholder="Kullanıcı adı">
    <button onclick="login()">Giriş</button>
</div>

<div class="card" id="chatBox" style="display:none;">
    <h3>Sohbet</h3>

    <div id="messages"></div>

    <input type="text" id="messageInput" placeholder="Mesaj yaz...">
    <button onclick="sendMessage()">Gönder</button>

    <button class="connect" onclick="connect()">🔌 Bağlan</button>
</div>

<script src="script.js"></script>
</body>
</html>
